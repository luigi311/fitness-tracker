app-id: com.luigi311.fitness-tracker
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk

command: fitness-tracker
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

  # Enable bluetooth
  - --allow=bluetooth
  - --system-talk-name=org.bluez

  - --filesystem=xdg-data:create
  - --filesystem=xdg-config:create

  - --own-name=com.luigi311.fitness-tracker
  - --talk-name=com.luigi311.fitness-tracker

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/python*/site-packages/*/tests
  - /lib/python*/site-packages/*/test
  - /share/man
  - "*.a"
  - "*.la"

modules:
  - builders.json
  - pip-sources.json

  # ---------------------------------------------------------------------------
  # Git dependencies – commits pinned from uv.lock.
  # ---------------------------------------------------------------------------
  - name: python3-pyftms
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/python-pyftms
        commit: b72174016b6fc8dc70f2af82da2a8f0014e745f6
        disable-submodules: true
        disable-shallow-clone: true

  - name: python3-bleaksport
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/bleaksport
        commit: 7d0aedacb8f116e96ba1748b8afa9f9dc4d5ee5f
        disable-submodules: true
        disable-shallow-clone: true

  - name: python3-libpebble2
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/libpebble2
        commit: be74eea06da089b79cd59ceb1ffeb62dbe515de6
        disable-submodules: true
        disable-shallow-clone: true

  - name: python3-workout-parser
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/workout_parser
        commit: 631d57b79e34633d71e2cbfb3b07337a77fa90a8
        disable-submodules: true
        disable-shallow-clone: true

  - name: fitness-tracker
    buildsystem: simple
    build-commands:
      # Install icon
      - install -Dm644 data/fitness-tracker.svg
        /app/share/icons/hicolor/scalable/apps/com.luigi311.fitness-tracker.svg

      # Update the .desktop file to use the correct icon name and executable
      - desktop-file-edit data/fitness-tracker.desktop
        --set-icon=com.luigi311.fitness-tracker
      - desktop-file-edit data/fitness-tracker.desktop --set-key=Exec
        --set-value=fitness-tracker

      # Install .desktop file
      - install -Dm644 data/fitness-tracker.desktop
        /app/share/applications/com.luigi311.fitness-tracker.desktop

      # Install fitness-tracker
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: dir
        path: .
